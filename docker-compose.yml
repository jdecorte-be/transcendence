version : "3.9"
services :
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: backend_prod:local
    env_file:
      - ./.env
    networks:
      - pongnet
    depends_on:
      database:
        condition: service_healthy
    expose:
      - 3001
      - 3004
    init: true
    restart: always
    
  nginx :
    build:
      context: .
      dockerfile: nginx/Dockerfile
    image: nginx_prod:local
    networks:
      - pongnet
      - dokploy-network
    depends_on:
      - backend
    ports:
      - 8000:8080
    init: true
    restart: always

  database:
    image: postgres:16-alpine
    restart: always
    env_file:
      - ./.env
    volumes:
      - database:/var/lib/postgresql/data
    networks:
      - pongnet
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  migration:
    build:
      context: ./backend/code/prisma
      dockerfile: Dockerfile
    image: prisma_migration:local
    env_file:
      - ./.env
    networks:
      - pongnet
    depends_on:
      database:
        condition: service_healthy
    restart: on-failure
   
volumes: 
  database:

networks:
  pongnet:
  dokploy-network:
    external: true
  
